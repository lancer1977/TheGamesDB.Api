name: ci

on:
  push:
    branches:
      - main
    paths:
      - "GamesDB.RestAsync/**"
      - "GamesDB.RestAsync.Test/**"
      - "README.md"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "GamesDB.RestAsync/**"
      - "GamesDB.RestAsync.Test/**"
      - "README.md"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Api.TheGamesDB/GamesDB.RestAsync.Test/GamesDB.RestAsync.Test.csproj

      - name: Build
        run: dotnet build Api.TheGamesDB/GamesDB.RestAsync.Test/GamesDB.RestAsync.Test.csproj -c Release --no-restore

      - name: Test
        run: dotnet test Api.TheGamesDB/GamesDB.RestAsync.Test/GamesDB.RestAsync.Test.csproj -c Release --no-build

      - name: Compute package version
        shell: bash
        run: echo "PACKAGE_VERSION=1.0.2.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack Api.TheGamesDB/GamesDB.RestAsync/GamesDB.RestAsync.csproj -c Release --no-build -p:PackageVersion=${PACKAGE_VERSION} -o artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
